<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Signup - CureLex</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/doctor.css">
</head>
<body>
    <h1>Doctor Signup</h1>
    <form action="#" method="post">
        <label for="name">Full Name</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="specialization">Specialization</label><br>
        <input type="text" id="specialization" name="specialization" required><br><br>

        <label for="license">License Number</label><br>
        <input type="text" id="license" name="license" required><br><br>

        <label for="password">Password</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <label for="confirm_password">Confirm Password</label><br>
        <input type="password" id="confirm_password" name="confirm_password" required><br><br>

        <button type="submit">Sign Up</button>
    </form>
    <p>Already have an account? <a href="doctor_login.html">Log in</a></p>
    <script src="../js/doctor.js"></script>
</body>
</html>
